services:
  docs:
    image: transaction_wise_local_docs
    container_name: transaction_wise_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./transaction_wise:/app/transaction_wise:z
    ports:
      - '9000:9000'
    command: /start-docs
